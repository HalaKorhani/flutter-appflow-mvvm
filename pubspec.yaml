name: myapp
description: "A Flutter MVVM mobile application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # iOS-style icons
  cupertino_icons: ^1.0.8

  # MVVM state management
  provider: ^6.1.5

  # Save Remember Me, timer, first login date, selected image path
  shared_preferences: ^2.5.5

  # Fetch todos from API
  http: ^1.6.0

  # Format date/time
  intl: ^0.19.0

  # Splash screen animation
  lottie: ^3.3.3

  # Pick image from gallery
  image_picker: ^1.2.2

  # Request storage/media permissions
  permission_handler: ^11.4.0

  # Detect Wi-Fi, mobile data, offline
  connectivity_plus: ^6.1.5

  # Foreground network monitoring service
  flutter_foreground_task: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/